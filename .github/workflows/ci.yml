name: CI

on:
  pull_request:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm --filter @tascal/api run lint
      - name: Format check
        run: pnpm --filter @tascal/api run format:check
      - name: Type check
        run: pnpm --filter @tascal/api run typecheck
      - name: Test
        run: pnpm --filter @tascal/api run test
      - name: Knip
        run: pnpm --filter @tascal/api run knip

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build API (type declarations)
        run: pnpm --filter @tascal/api run build
      - name: Lint
        run: pnpm --filter @tascal/web run lint
      - name: Format check
        run: pnpm --filter @tascal/web run format:check
      - name: Type check
        run: pnpm --filter @tascal/web run typecheck
      - name: Test
        run: pnpm --filter @tascal/web run test
      - name: Knip
        run: pnpm --filter @tascal/web run knip

  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build API (type declarations)
        run: pnpm --filter @tascal/api run build
      - name: Lint
        run: pnpm --filter tascal-cli run lint
      - name: Format check
        run: pnpm --filter tascal-cli run format:check
      - name: Type check
        run: pnpm --filter tascal-cli run typecheck
      - name: Test
        run: pnpm --filter tascal-cli run test
      - name: Knip
        run: pnpm --filter tascal-cli run knip
